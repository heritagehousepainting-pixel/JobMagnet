# Render Blueprint for JobMagnet.
#
# To deploy: this repo is on GitHub; in the Render dashboard choose "New +" ->
# "Blueprint", point it at heritagehousepainting-pixel/JobMagnet, branch main.
# Render reads this file and provisions the service + database + env vars below.
# Add the real SECRETS (AI brain key, Twilio, SMTP, Stripe) in the dashboard
# afterward so they never enter git.
#
# The app now runs on managed Postgres (no SQLite disk). Two workers are safe
# because Postgres handles concurrent writers.

databases:
  - name: jobmagnet-db
    plan: basic-256mb  # CONFIRM tier in Render dashboard; must include daily backups;
                       # PITR (point-in-time recovery) requires a higher tier — see
                       # docs/superpowers/plans/postgres-backup-restore.md for guidance.
    postgresMajorVersion: "16"

services:
  - type: web
    name: jobmagnet
    runtime: python
    plan: starter                 # ~$7/mo, always-on
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobmagnet-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: JOBMAGNET_SECRET         # signs login cookies
        generateValue: true
      - key: JOBMAGNET_WEBHOOK_TOKEN  # guards /webhooks/* and /tasks/* (fails closed without it)
        generateValue: true
      - key: JOBMAGNET_SECRETS_KEY    # encrypts stored connection credentials at rest
        generateValue: true
      - key: JOBMAGNET_HTTPS          # secure session cookies (Render serves HTTPS)
        value: "1"
      # ---- Add these as SECRETS in the Render dashboard (Environment tab) ----
      # The AI brain (pick one; no key => safe demo writer, fine for a first smoke test):
      #   JOBMAGNET_PROVIDER = minimax   and  MINIMAX_API_KEY   = ...
      #   JOBMAGNET_PROVIDER = claude    and  ANTHROPIC_API_KEY = sk-ant-...
      #
      # First-login owner (optional; defaults to a seeded login you then change):
      #   JOBMAGNET_OWNER_EMAIL / JOBMAGNET_OWNER_PASSWORD
      #
      # Real outbound (later, see SETUP_NEEDED.md):
      #   TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN / TWILIO_FROM   (SMS)
      #   JOBMAGNET_EMAIL_FROM / SMTP_HOST / SMTP_USER / SMTP_PASSWORD   (email)
      # Billing (optional): STRIPE_SECRET_KEY
      #
      # Scheduled work (autopilot tick + weekly digest) is driven by the cron
      # services below — no external scheduler needed.

  # ---- Autonomy heartbeat: the wire that makes autopilot run unattended ----------
  # Every 15 min: publishes due scheduled posts + runs each Premium+ tenant's
  # take_over plays through the same consent-gated seams the buttons use. Safe at
  # this frequency by design (cadence pacing + daily SMS caps + dedupe guards).
  # Token-gated: /tasks/* fails closed without JOBMAGNET_WEBHOOK_TOKEN, synced here
  # from the web service so both sides always share the same generated secret.
  - type: cron
    name: jobmagnet-tick
    runtime: python
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: "echo no build needed"
    startCommand: >-
      python -c "import os,urllib.request,urllib.parse;
      r=urllib.request.urlopen(urllib.request.Request('https://jobmagnet-49l9.onrender.com/tasks/tick',
      data=urllib.parse.urlencode({'token': os.environ['JOBMAGNET_WEBHOOK_TOKEN']}).encode()),
      timeout=280); print('tick', r.status, r.read()[:400])"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: JOBMAGNET_WEBHOOK_TOKEN
        fromService:
          type: web
          name: jobmagnet
          envVarKey: JOBMAGNET_WEBHOOK_TOKEN

  # ---- Weekly owner digest (Mondays 12:00 UTC ≈ Monday morning US-East) ----------
  # Emails each tenant owner their digest; simulated (recorded, not sent) until SMTP
  # is configured — safe to run either way.
  - type: cron
    name: jobmagnet-digest
    runtime: python
    plan: starter
    schedule: "0 12 * * 1"
    buildCommand: "echo no build needed"
    startCommand: >-
      python -c "import os,urllib.request,urllib.parse;
      r=urllib.request.urlopen(urllib.request.Request('https://jobmagnet-49l9.onrender.com/tasks/digest',
      data=urllib.parse.urlencode({'token': os.environ['JOBMAGNET_WEBHOOK_TOKEN']}).encode()),
      timeout=280); print('digest', r.status, r.read()[:400])"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: JOBMAGNET_WEBHOOK_TOKEN
        fromService:
          type: web
          name: jobmagnet
          envVarKey: JOBMAGNET_WEBHOOK_TOKEN
